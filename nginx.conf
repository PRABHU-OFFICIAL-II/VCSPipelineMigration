server {
  listen 80;
  root /usr/share/nginx/html;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
  gzip_proxied any;
  gzip_vary on;
  gzip_comp_level 6;
  gzip_buffers 16 8k;
  gzip_http_version 1.1;

  # Route /api-proxy/* to the Node.js proxy server running in the same container
  location /api-proxy/ {
    proxy_pass         http://localhost:3001;
    proxy_http_version 1.1;

    # Pass all client headers through (x-proxy-host, INFA-SESSION-ID, etc.)
    proxy_pass_request_headers on;

    # Remove and reset CORS headers so the proxy's own CORS headers win
    proxy_hide_header Access-Control-Allow-Origin;
    add_header        Access-Control-Allow-Origin  * always;
    add_header        Access-Control-Allow-Methods "GET,POST,PUT,DELETE,OPTIONS,PATCH" always;
    add_header        Access-Control-Allow-Headers "*" always;

    proxy_read_timeout  120s;
    proxy_connect_timeout 10s;
  }

  # SPA fallback — all non-file routes serve index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Long-lived cache for static assets
  location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|svg|webm)$ {
    expires 30d;
    access_log off;
    add_header Cache-Control "public";
  }

  # Block dotfiles
  location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
  }
}
